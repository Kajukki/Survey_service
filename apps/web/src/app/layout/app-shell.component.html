<div class="shell">
  <header class="shell-header">
    <div class="shell-header-inner">
      <div class="brand">
        <h1>Survey Service</h1>
        <p>Analysis workspace</p>
      </div>
      <button type="button" class="ghost" (click)="logout()">Sign out</button>
    </div>
  </header>

  <nav class="shell-nav" aria-label="Primary">
    <div class="shell-nav-inner">
      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Dashboard
      </a>
      <a routerLink="/connections" routerLinkActive="active">Connections</a>
      <a routerLink="/forms" routerLinkActive="active">Forms</a>
      <a routerLink="/sync-jobs" routerLinkActive="active">Sync jobs</a>
      <a routerLink="/exports" routerLinkActive="active">Exports</a>
      <a routerLink="/sharing" routerLinkActive="active">Sharing</a>
    </div>
  </nav>

  <main class="shell-content">
    <router-outlet />
  </main>
</div>
