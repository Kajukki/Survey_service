<section class="card table-card">
  <h3>Question breakdown table</h3>
  <table>
    <thead>
      <tr>
        <th>Question</th>
        <th>Total responses</th>
        <th>Top option</th>
      </tr>
    </thead>
    <tbody>
      @for (question of questions(); track question.id) {
        <tr>
          <td>{{ question.label }}</td>
          <td>{{ question.responses }}</td>
          <td>{{ topDistributionLabel(question) }}</td>
        </tr>
      } @empty {
        <tr>
          <td colspan="3">No question data available.</td>
        </tr>
      }
    </tbody>
  </table>
</section>
