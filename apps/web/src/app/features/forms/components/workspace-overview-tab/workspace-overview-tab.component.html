<section class="overview-grid">
  <article class="card metric">
    <h3>Sections</h3>
    <p class="metric-value">{{ structure().sections.length }}</p>
  </article>
  <article class="card metric">
    <h3>Questions</h3>
    <p class="metric-value">{{ structure().questionCount }}</p>
  </article>
  <article class="card metric">
    <h3>Responses</h3>
    <p class="metric-value">{{ structure().responseCount }}</p>
  </article>
</section>
